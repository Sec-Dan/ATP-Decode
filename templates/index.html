<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATP-Decode — SafeLinks Decoder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='atpd.css') }}">
</head>
<body>
    <header>
        <span class="logo">ATP-Decode</span>
        <span class="tagline">Microsoft SafeLinks decoder</span>
    </header>

    <main>
        <div class="card">
            <label for="safelink">Paste SafeLinks URL</label>
            <textarea id="safelink" placeholder="https://nam12.safelinks.protection.outlook.com/?url=..." autofocus></textarea>
            <div class="actions">
                <button onclick="clearAll()" class="btn-secondary">Clear</button>
            </div>
        </div>

        <div class="card">
            <label for="target_url">Decoded URL</label>
            <textarea id="target_url" readonly placeholder="Decoded URL will appear here…"></textarea>
            <div class="actions">
                <button onclick="copyResult()" class="btn-primary" id="copy-btn">Copy URL</button>
            </div>
        </div>
    </main>

    <footer>
        Part of <a href="https://dansec.red">DanSec</a>
    </footer>

    <script src="{{ url_for('static', filename='atpd.js') }}"></script>
</body>
</html>
